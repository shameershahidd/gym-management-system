<!DOCTYPE html>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Gym Manager</h2>

            <li><a href="members.html">Members</a></li>
            <li><a href="classes.html">Classes & Bookings</a></li>
